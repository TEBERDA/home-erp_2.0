<div class="card card-sm">
    <div class="card-body">
        <div class="row align-items-center">
            <div class="col-auto">
                <span class="bg-blue text-white avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6 7h11a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-11a2 2 0 0 1 -2 -2v-6a2 2 0 0 1 2 -2" /><path d="M4 9v6" /><path d="M7 10v4" /><path d="M10 10v4" /><path d="M13 10v4" /><path d="M16 10v4" /></svg>
                </span>
            </div>
            <div class="col">
                <div class="font-weight-medium">
                    {{ battery.name }}
                </div>
                <div class="text-muted small">
                    {{ battery.type }} • Циклов: {{ battery.charge_cycles }}
                </div>
                {% if battery.location %}
                <div class="text-muted small">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-inline" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><circle cx="12" cy="11" r="3" /><path d="M17.657 16.657l-4.243 4.243a2 2 0 0 1 -2.827 0l-4.244 -4.243a8 8 0 1 1 11.314 0z" /></svg>
                    {{ battery.location.name }}
                </div>
                {% endif %}
            </div>
        </div>
        <div class="mt-3">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <div class="text-muted small">
                        {% if battery.last_charge_date %}
                            Заряжен {{ battery.last_charge_date.strftime('%d.%m.%Y') }}
                        {% else %}
                            Никогда не заряжался
                        {% endif %}
                    </div>
                </div>
                <div class="col-auto">
                    <button hx-post="/api/v1/batteries/{{ battery.id }}/charge" 
                            hx-target="#battery-{{ battery.id }}" 
                            hx-swap="outerHTML"
                            class="btn btn-sm btn-outline-primary">
                        Зарядить
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
