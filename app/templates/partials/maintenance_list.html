<div class="table-responsive">
    <table class="table card-table table-vcenter">
        <thead>
            <tr>
                <th>Задача</th>
                <th>Период</th>
                <th>Последний раз</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for task in equipment.maintenance_tasks %}
            <tr>
                <td>{{ task.name }}</td>
                <td>{{ task.period_days }} дн.</td>
                <td>{{ task.last_done_date.strftime('%d.%m.%Y') if task.last_done_date else "Никогда" }}</td>
                <td>
                    <button hx-post="/api/v1/equipment/{{ equipment.id }}/maintenance/{{ task.id }}/do" 
                            hx-target="#maintenance-list"
                            class="btn btn-sm btn-primary">
                        Выполнено
                    </button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center text-muted">Задач нет</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
