{% extends "base.html" %}

{% block sidebar %}{% endblock %}

{% block content %}
<div class="page page-center">
    <div class="container container-tight py-4">
        <div class="text-center mb-4">
            <a href="/" class="navbar-brand navbar-brand-autodark">
                <h2 class="fw-bold text-primary">Home ERP</h2>
            </a>
        </div>
        <div class="card card-md shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Login to your household</h2>
                <form action="/api/v1/auth/login" method="post" autocomplete="off" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" autocomplete="off" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">
                            Password
                        </label>
                        <div class="input-group input-group-flat">
                            <input type="password" name="password" class="form-control" placeholder="Your password" autocomplete="off" required>
                        </div>
                    </div>
                    <div class="form-footer">
                        <button type="submit" class="btn btn-primary w-100">Sign in</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center text-secondary mt-3">
            Don't have account yet? <a href="/register" tabindex="-1">Sign up</a>
        </div>
    </div>
</div>

<style>
    body { padding-left: 0 !important; }
    .navbar { display: none !important; }
    .page-wrapper { margin-left: 0 !important; }
</style>
{% endblock %}
