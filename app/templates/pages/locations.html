{% extends "base.html" %}

{% block content %}
<div class="row row-deck row-cards">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Справочник локаций</h3>
            </div>
            <div class="table-responsive">
                <table class="table card-table table-vcenter">
                    <thead>
                        <tr>
                            <th>Название</th>
                            <th>Описание</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if locations %}
                            {% for location in locations %}
                            <tr>
                                <td>
                                    <span class="text-reset d-inline-block">{{ location.name }}</span>
                                </td>
                                <td class="text-muted">{{ location.description or "-" }}</td>
                            </tr>
                            {% endfor %}
                        {% else %}
                        <tr>
                            <td colspan="2" class="text-center text-muted">Локаций не найдено.</td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
