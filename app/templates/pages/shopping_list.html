{% extends "base.html" %}

{% block content %}
<div class="row row-deck row-cards">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Управление списком покупок</h3>
            </div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-8">
                        <form hx-post="/ui/shopping-list/add" hx-target="#shopping-list-table" hx-swap="innerHTML">
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <label class="form-label">Товар</label>
                                    <select name="product_id" class="form-select" required>
                                        <option value="">-- Выберите товар --</option>
                                        {% for product in products %}
                                        <option value="{{ product.id }}">{{ product.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Количество</label>
                                    <input type="number" step="0.01" min="0.01" name="amount" class="form-control" placeholder="0.00" required>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-primary w-100">Добавить</button>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <form hx-post="/ui/shopping-list/auto-generate" hx-target="#shopping-list-table" hx-swap="innerHTML" class="w-100">
                            <button type="submit" class="btn btn-success w-100">Автогенерация</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Позиции списка покупок</h3>
            </div>
            <div id="shopping-list-table">
                {% include "partials/shopping_list_table.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
