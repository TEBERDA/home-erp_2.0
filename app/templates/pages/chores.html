{% extends "base.html" %}

{% block content %}
<div class="row row-cards">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Список домашних дел</h3>
                <div class="card-actions">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal-chore">
                        Добавить дело
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    {% for item in chores %}
                    <div class="col-md-6 col-lg-4">
                        {% include "partials/chore_item.html" %}
                    </div>
                    {% else %}
                    <div class="col-12 text-center text-muted py-4">
                        Список дел пуст. Добавьте первое дело!
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal modal-blur fade" id="modal-chore" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <form hx-post="/ui/chores" hx-target="body">
                <div class="modal-header">
                    <h5 class="modal-title">Новое домашнее дело</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Название</label>
                        <input type="text" class="form-control" name="name" placeholder="Например: Помыть пол" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Периодичность (в днях)</label>
                            <input type="number" class="form-control" name="period_days" value="7" min="1" required>
                        </div>
                    </div>
                    <div class="hr-text">Инвентарь (опционально)</div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Расходный материал</label>
                            <select class="form-select" name="product_id"
                                    hx-get="/ui/partials/units-for-product" 
                                    hx-target="#chore-unit-container">
                                <option value="">-- Не выбрано --</option>
                                {% for p in products %}
                                <option value="{{ p.id }}">{{ p.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Количество</label>
                            <input type="number" step="0.001" class="form-control" name="product_amount" value="0">
                        </div>
                        <div class="col-md-3" id="chore-unit-container">
                            <label class="form-label">Единица</label>
                            <select class="form-select" name="product_unit_id" disabled>
                                <option value="">--</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn me-auto" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
