services:
  postgres:
    image: postgres:15-alpine
    container_name: home_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: home_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d home_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
