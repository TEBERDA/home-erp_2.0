services:
  db:
    image: postgres:15-alpine
    container_name: home_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-home_erp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-home_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home_erp_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Home ERP}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SERVER: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-home_erp}
      EXPIRING_SOON_DAYS: ${EXPIRING_SOON_DAYS:-7}
    ports:
      - "8000:8000"
    command: >
      sh -c "until alembic upgrade head; do
               echo 'Waiting for database...';
               sleep 2;
             done;
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
